- baseInfo:
    api_name: submit telemetry negative
    url: /api/fusions/fusion1/devices/not-exist-device/telemetry
    method: POST
    header:
      Content-Type: application/json
      Accept: application/json
  testCase:
    - case_name: reject telemetry for missing device
      json_file: data/payloads/telemetry_normal.json
      json_override:
        dataPayload:
          device_name: not-exist-device
      validation:
        - status_code: 200
        - code: 40400
        - jsonpath_eq:
            $.message: device_not_found
