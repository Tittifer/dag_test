- baseInfo:
    api_name: topology query
    url: /api/topology
    method: GET
    header:
      Accept: application/json
  testCase:
    - case_name: topology returns cloud fusions and devices
      validation:
        - status_code: 200
        - code: 0
        - message: ok
        - jsonpath_exists:
            - $.data.storage
            - $.data.cloud
            - $.data.fusions
            - $.data.devices
        - response_time_less_than: 2000

