- baseInfo:
    api_name: health check
    url: /api/health
    method: GET
    header:
      Accept: application/json
  testCase:
    - case_name: health returns service status
      validation:
        - status_code: 200
        - code: 0
        - message: ok
        - jsonpath_eq:
            $.data.service: dag-docker-sim-java
            $.data.mode: spring-boot-rest
        - jsonpath_exists:
            - $.data.storage
            - $.data.cloud
            - $.data.fusions
            - $.data.simulated_device_count
        - jsonpath_type:
            $.data.storage: dict
            $.data.cloud: dict
            $.data.fusions: list
            $.data.simulated_device_count: int
        - jsonpath_greater_or_equal:
            $.data.simulated_device_count: 0
        - response_time_less_than: 2000
