- baseInfo:
    api_name: cloud ledger query
    url: /api/cloud/ledger
    method: GET
    header:
      Accept: application/json
  testCase:
    - case_name: cloud ledger returns summary and transactions
      validation:
        - status_code: 200
        - code: 0
        - message: ok
        - jsonpath_exists:
            - $.data.summary
            - $.data.transactions
            - $.data.archive_size
            - $.data.storage
        - jsonpath_type:
            $.data.summary: dict
            $.data.transactions: list
            $.data.archive_size: int
            $.data.storage: dict
        - response_time_less_than: 2000
